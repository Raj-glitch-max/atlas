# Atlas product stack: the server (durable), with Prometheus scraping its real
# /metrics and Grafana for dashboards. This is the deployable product — distinct
# from atlas-lab/ (the SPIRE experiment substrate).
name: atlas

services:
  atlas-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    # Durable state + authority key persist on the named volume, so records
    # survive restarts. Set ATLAS_API_KEY to guard mutating endpoints, and
    # ATLAS_ALLOW_ORIGIN to pin CORS to your UI origin.
    command: ["-addr", "0.0.0.0:8087", "-store", "/data/state.json", "-key", "/data/authority.key", "-trust-domain", "domain-a.test", "-rate-limit", "600"]
    environment:
      - ATLAS_API_KEY=${ATLAS_API_KEY:-}
      - ATLAS_ALLOW_ORIGIN=${ATLAS_ALLOW_ORIGIN:-*}
    ports:
      - "8087:8087"
    volumes:
      - atlas-data:/data
    # Hardening: unprivileged user, read-only root filesystem (only the /data
    # volume + a small tmpfs are writable), no capabilities, no privilege
    # escalation. The store writes its atomic temp file inside /data, so a
    # read-only root does not break durability.
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - atlas-server
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  atlas-data:

# Gitleaks config — stack-agnostic secret scanning.
# Extends the default ruleset; allowlist vendored reference content and sealed evidence.
title = "Engineering Foundation — secret scan"

[extend]
useDefault = true

[allowlist]
description = "Ignore vendored reference skills, sealed lab evidence, and public conformance test vectors"
paths = [
  '''claude-skills/.*''',
  '''lab/evidence/.*''',
  # Conformance/adversarial vectors are public interop test data — signed test
  # records (JWS/JWT) over test claims, no real keys. They are meant to be
  # replayed by any implementation, not secrets.
  '''tests/vectors/.*''',
]

# SPIRE server, trust domain A. Independent deployment; federation DISABLED
# (no federates_with) — matches frozen EXP-001 assumption U1.
server {
    bind_address = "0.0.0.0"
    bind_port    = "8081"
    trust_domain = "domain-a.test"
    data_dir     = "/run/spire/data"
    log_level    = "INFO"
    ca_ttl       = "24h"
    default_x509_svid_ttl = "1h"
    default_jwt_svid_ttl  = "30s"   # short-lived; delegation TTL sits under this
}
plugins {
    DataStore "sql" {
        plugin_data { database_type = "sqlite3" connection_string = "/run/spire/data/datastore.sqlite3" }
    }
    KeyManager "memory" { plugin_data {} }
    NodeAttestor "join_token" { plugin_data {} }
}

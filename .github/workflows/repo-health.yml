name: repo-health

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: repo-health-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pre-commit
        run: python -m pip install --upgrade pre-commit

      - name: pre-commit (all hooks, all files)
        run: pre-commit run --all-files

      - name: markdown lint
        run: npx --yes markdownlint-cli2 '**/*.md' '!claude-skills/**' '!lab/evidence/**'

      - name: frozen-docs integrity
        run: bash scripts/check-frozen-docs.sh

      # Run the gitleaks CLI directly (same as `make secrets`), not the
      # gitleaks-action wrapper — the wrapper now requires a paid GITLEAKS_LICENSE
      # and fails the build when its license-check API call is rate-limited. The
      # tool itself is free; this is deterministic and needs no secret.
      - name: secret scan
        env:
          GITLEAKS_VERSION: "8.18.4"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --redact --no-banner --config .gitleaks.toml --source .
